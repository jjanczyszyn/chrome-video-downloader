name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Unit tests ────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type-check

      - name: Run unit tests
        run: pnpm test

  # ─── Build ─────────────────────────────────────────────────────────────────
  build:
    name: Build Extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build extension
        run: pnpm build

      - name: Verify dist structure
        run: |
          echo "dist/ contents:"
          ls -la dist/
          test -f dist/manifest.json || (echo "ERROR: manifest.json missing" && exit 1)
          test -f dist/background.js || (echo "ERROR: background.js missing" && exit 1)
          test -f dist/content-script.js || (echo "ERROR: content-script.js missing" && exit 1)
          test -f dist/popup.html || (echo "ERROR: popup.html missing" && exit 1)
          echo "✓ All required files present"

      - name: Validate manifest.json
        run: |
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('dist/manifest.json', 'utf8'));
            if (m.manifest_version !== 3) throw new Error('Not MV3!');
            if (!m.background?.service_worker) throw new Error('No service worker!');
            console.log('✓ manifest.json valid:', m.name, 'v' + m.version);
          "

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-dist
          path: dist/
          retention-days: 7

  # ─── E2E tests ─────────────────────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download built extension
        uses: actions/download-artifact@v4
        with:
          name: extension-dist
          path: dist/

      - name: Install Playwright + Chromium
        run: pnpm exec playwright install chromium --with-deps

      - name: Start mock server + Run E2E tests
        run: pnpm test:e2e
        env:
          CI: true

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
